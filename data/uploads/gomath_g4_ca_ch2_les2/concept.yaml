  example_walkthrough: "**Problem:** Evan's dog weighs 7 times as much as Oxana's dog. Together, the dogs weigh 72 pounds.\
    \ How much does Evan's dog weigh?\n\n**Step 1: Draw a model.**\nLet 'n' represent the unknown weight of Oxana's dog.\n\
    - Oxana's dog: Draw one bar segment and label it 'n'.\n- Evan's dog: Draw 7 bar segments, each labeled 'n', to represent\
    \ 7 times as much.\n- The total length of all 8 segments combined represents the total weight of 72 pounds.\n\n**Step\
    \ 2: Use the model to write an equation and find the value of n.**\nThe model shows that there are 8 equal parts (n) that\
    \ make up the total weight of 72 pounds.\n- Equation: n + 7n = 72, which simplifies to 8n = 72.\n- Solve for n: Divide\
    \ both sides by 8.\n  n = 72 / 8\n  n = 9\nSo, Oxana's dog weighs 9 pounds.\n\n**Step 3: Find how much Evan's dog weighs.**\n\
    Evan's dog weighs 7 times as much as Oxana's dog.\n- Evan's dog weight = 7 * n\n- Evan's dog weight = 7 * 9\n- Evan's\
    \ dog weight = 63 pounds.\n\n**Answer:** Evan's dog weighs 63 pounds."
