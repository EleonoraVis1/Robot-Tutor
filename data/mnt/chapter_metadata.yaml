chapter: 1
title: "Place Value, Addition, and Subtraction to One Million"
critical_area: "Place Value and Operations with Whole Numbers"
grade: 4
total_lessons: 8
schema_version: "1.1"

# ── Standards coverage map ───────────────────────────────────────────────────
standards_coverage:
  "4.NBT.1":
    description: "Recognise that in a multi-digit whole number, a digit in one place represents ten times what it represents in the place to its right."
    lessons: ["math_g4_ch1_l1", "math_g4_ch1_l5"]
  "4.NBT.2":
    description: "Read and write multi-digit whole numbers; compare two multi-digit numbers."
    lessons: ["math_g4_ch1_l2", "math_g4_ch1_l3", "math_g4_ch1_l5"]
  "4.NBT.3":
    description: "Use place value understanding to round multi-digit whole numbers."
    lessons: ["math_g4_ch1_l4", "math_g4_ch1_l6", "math_g4_ch1_l7"]
  "4.NBT.4":
    description: "Fluently add and subtract multi-digit whole numbers using the standard algorithm."
    lessons: ["math_g4_ch1_l6", "math_g4_ch1_l7", "math_g4_ch1_l8"]
  "4.OA.3":
    description: "Solve multi-step word problems posed with whole numbers."
    lessons: ["math_g4_ch1_l6", "math_g4_ch1_l7"]

