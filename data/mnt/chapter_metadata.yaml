# ── Visual routing ───────────────────────────────────────────────────────────
# RAG usage: if a question targets a lesson in lessons_with_visuals,
# Reachy MUST cite the textbook page and cannot fully answer without it.

lessons_with_visuals:
  - lesson_id: "math_g4_ch1_l1"
    title: "Model Place Value Relationships"
    visual_pages: [5, 6, 7]
    handling: cite_only
    visual_types: ["base-ten block diagrams", "place-value table"]

  - lesson_id: "math_g4_ch1_l3"
    title: "Compare and Order Numbers"
    visual_pages: [14, 16]
    handling: cite_only
    visual_types: ["number lines", "pictograph"]

  - lesson_id: "math_g4_ch1_l4"
    title: "Round Numbers"
    visual_pages: [17, 18, 19, 20]
    handling: cite_only
    visual_types: ["number lines", "benchmark estimation images"]

  - lesson_id: "math_g4_ch1_l5"
    title: "Rename Numbers"
    visual_pages: [23, 24, 25]
    handling: cite_only
    visual_types: ["base-ten block quick pictures", "place-value charts"]

  - lesson_id: "math_g4_ch1_l8"
    title: "Problem Solving — Comparison Problems"
    visual_pages: [35, 36, 37]
    handling: cite_only
    visual_types: ["bar models (tape diagrams)"]

# NOTE: Lessons 1.6 and 1.7 have individual questions (q_g1) that reference
# a place-value grid tool. Those questions carry per-question has_visual: true
# flags in their questions.yaml files, but the lesson as a whole is text-safe
# for concept delivery.
lessons_text_safe:
