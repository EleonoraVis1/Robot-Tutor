    visual_description: Bar models showing 24 as 6 groups of 4, and 24 as 4 groups
      of 6.
    prompt: 'Write a statement from the box to show what the model describes. [Box
      contains: ''24 is _ times as many as _.'' and ''24 is _ times as many as _ .'']

      '
    answer: 24 is 6 times as many as 4. OR 24 is 4 times as many as 6.
    options:
    - 24 is 6 times as many as 4.
    - 24 is 24 times as many as 1.
    - 24 is 12 times as many as 2.
    correct_answer: 24 is 6 times as many as 4.
    citation_page: 62
