  word_problems:
  - id: q_w1
    type: word_problem
    difficulty: deeper
    has_visual: false
    prompt: 'Nando has 4 goldfish. Jill has 3 goldfish. Cooper has 2 times as many
      goldfish as Nando and Jill combined. Write an equation that compares the number
      of goldfish Cooper has with the number of goldfish that Nando and Jill have.

      '
    answer: Nando and Jill combined have 4 + 3 = 7 goldfish. Cooper has 2 times as
      many, so Cooper has 2 × (4 + 3) = 14 goldfish. The equation is C = 2 × (4 +
      3) or C = 2 × 7.
    options:
    - C = 2 + (4 + 3)
    - C = 2 × (4 + 3)
    - C = 2 × 4 + 3
    correct_answer: C = 2 × (4 + 3)
    citation_page: 61
  - id: q_w2
    type: word_problem
    difficulty: think_smarter
    has_visual: true
    visual_handling: cite_only
    visual_description: A bar model showing Luca's 72 cards as 8 groups of Han's unknown
      amount (n).
    prompt: 'Luca has 72 baseball cards. This is 8 times as many cards as Han has.
      How many baseball cards does Han have? a. What do you need to find? b. How can
      you use a model to find the number of cards Han has? c. Draw the model. d. Write
      an equation and solve.

      '
    answer: a. You need to find the number of baseball cards Han has. b. You can use
      a bar model to represent Luca's 72 cards as 8 equal groups, where each group
      represents Han's cards. c. (Model would show 8 boxes, total 72, each box 'n').
      d. 72 = 8 × n; n = 9. So, Han has 9 baseball cards.
    options:
    - 8 cards
    - 9 cards
    - 64 cards
    correct_answer: 9 cards
    citation_page: 62
  - id: q_w3
    type: fill_in
