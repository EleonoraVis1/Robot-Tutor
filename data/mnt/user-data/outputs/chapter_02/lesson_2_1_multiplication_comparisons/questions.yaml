  word_problems:
  - id: q_w1
    type: word_problem
    difficulty: deeper
    has_visual: false
    prompt: 'Nando has 4 goldfish. Jill has 3 goldfish. Cooper has 2 times as many
      goldfish as Nando and Jill combined. Write an equation that compares the number
      of goldfish Cooper has with the number of goldfish that Nando and Jill have.

      '
    answer: Nando and Jill combined have 4 + 3 = 7 goldfish. Cooper has 2 times as
      many, so Cooper's goldfish = 2 × (4 + 3) or Cooper's goldfish = 2 × 7. The equation
      is C = 2 × (4 + 3) or C = 2 × 7.
    options:
    - C = 2 + (4 + 3)
    - C = 2 × (4 + 3)
    - C = 2 × 4 + 3
    correct_answer: C = 2 × (4 + 3)
    citation_page: 61
  - id: q_w2
    type: word_problem
    difficulty: mathematical_practice
    has_visual: false
    prompt: 'Write a comparison sentence about pet food that could be represented
      using the equation 12 = 4 × 3.

      '
    answer: 'Example: There are 12 bags of dog food. This is 4 times as many bags
      as cat food. There are 3 bags of cat food.'
    options:
    - 12 bags of food is 4 more than 3 bags.
    - 12 bags of food is 4 times as many as 3 bags.
    - 4 bags of food is 3 times as many as 12 bags.
    correct_answer: 12 bags of food is 4 times as many as 3 bags.
    citation_page: 61
  - id: q_w3
    type: word_problem
    difficulty: think_smarter
    has_visual: true
    visual_handling: cite_only
    visual_description: A bar model showing 72 baseball cards as 8 times Han's unknown
      number of cards.
    prompt: 'Luca has 72 baseball cards. This is 8 times as many cards as Han has.
      How many baseball cards does Han have? a. What do you need to find? b. How can
      you use a model to find the number of cards Han has? c. Draw the model. d. Write
      an equation and solve.

      '
    answer: a. The number of baseball cards Han has. b. Draw a bar model where 72
      is divided into 8 equal parts, with each part representing Han's cards. c. (Model
      drawn) d. 72 = 8 × n; n = 9. So, Han has 9 baseball cards.
    options:
    - Han has 80 baseball cards.
    - Han has 9 baseball cards.
    - Han has 64 baseball cards.
    correct_answer: Han has 9 baseball cards.
    citation_page: 62
  - id: q_w4
    type: multiple_select
