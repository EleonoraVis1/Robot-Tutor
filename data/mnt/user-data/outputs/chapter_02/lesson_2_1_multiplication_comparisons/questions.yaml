  - id: q_i5
    type: word_problem
    has_visual: false
    prompt: Nando has 4 goldfish. Jill has 3 goldfish. Cooper has 2 times as many
      goldfish as Nando and Jill combined. Write an equation that compares the number
      of goldfish Cooper has with the number of goldfish that Nando and Jill have.
    answer: 'First, find the total goldfish Nando and Jill have: 4 + 3 = 7. Cooper
      has 2 times as many as this combined total. So, the equation is C = 2 × (4 +
      3).'
    options:
    - C = 2 + (4 + 3)
    - C = 2 × (4 + 3)
    - C = 2 × 4 + 3
    correct_answer: C = 2 × (4 + 3)
    citation_page: 61
    difficulty: deeper
  - id: q_i6
    type: short_answer
    has_visual: false
    prompt: Write a comparison sentence about pet food that could be represented using
      the equation 12 = 4 × 3.
    answer: 12 bags of pet food is 4 times as many as 3 bags of pet food.
    options:
    - 12 bags is 4 more than 3 bags.
    - 12 bags is 4 times as many as 3 bags.
    - 12 bags is 3 times as many as 4 bags.
    correct_answer: 12 bags is 4 times as many as 3 bags.
    citation_page: 61
    difficulty: mathematical_practice
  word_problems:
  - id: q_w1
    type: word_problem
    has_visual: true
    visual_handling: cite_only
    visual_description: A model showing 72 baseball cards divided into 8 equal groups,
      with each group representing Han's cards.
    prompt: Luca has 72 baseball cards. This is 8 times as many cards as Han has.
      How many baseball cards does Han have? a. What do you need to find? b. How can
      you use a model to find the number of cards Han has? c. Draw the model. d. Write
      an equation and solve.
    answer: 'a. You need to find the number of baseball cards Han has. b. You can
      use a model by drawing 8 equal groups that total 72 cards. Each group will represent
      the number of cards Han has. c. The model should show 8 equal groups, with a
      total of 72. d. Equation: 72 = 8 × n. To solve, divide 72 by 8. n = 9. So, Han
      has 9 baseball cards.'
    options:
    - 8 cards
    - 9 cards
    - 64 cards
    correct_answer: 9 cards
    citation_page: 62
    difficulty: think_smarter
  - id: q_w2
    type: short_answer
    has_visual: true
    visual_handling: cite_only
    visual_description: Models showing 24 as 6 groups of 4 and 4 groups of 6.
    prompt: 'Write a statement from the box to show what the model describes. (Box
      contains: ''24 is _ times as many as _.'' and ''24 is _ times as many as _.'')'
    answer: 'The model shows 24 as 6 groups of 4, or 4 groups of 6. So, a statement
      could be: 24 is 6 times as many as 4.'
    options:
    - 24 is 6 more than 4.
    - 24 is 6 times as many as 4.
    - 24 is 24 times as many as 1.
    correct_answer: 24 is 6 times as many as 4.
    citation_page: 62
    difficulty: think_smarter
