questions:
  guided:
  - id: q_g1
    type: word_problem
    has_visual: false
    prompt: There are 8 students in the art club. There are 3 times as many students
      in chorus. How many students are in chorus?
    answer: 'To find the number of students in chorus, multiply the number of art
      club students by 3. Equation: n = 3 × 8. So, n = 24. There are 24 students in
      chorus.'
    options:
    - 21 students
    - 24 students
    - 11 students
    correct_answer: 24 students
    citation_page: 60
  - id: q_g2
    type: fill_in
    has_visual: true
    visual_handling: cite_only
    visual_description: A model representing 6 groups of 2, totaling 12.
    prompt: Draw a model and write an equation. 6 times as many as 2 is 12.
    answer: The model should show 6 groups with 2 items in each group, totaling 12.
      The equation is 6 × 2 = 12.
    options:
    - 6 + 2 = 8
    - 6 × 2 = 12
    - 12 ÷ 6 = 2
    correct_answer: 6 × 2 = 12
    citation_page: 61
  - id: q_g3
    type: fill_in
    has_visual: true
    visual_handling: cite_only
    visual_description: A model representing 4 groups of 5, totaling 20.
    prompt: Draw a model and write an equation. 20 is 4 times as many as 5.
    answer: The model should show 4 groups with 5 items in each group, totaling 20.
      The equation is 20 = 4 × 5.
    options:
    - 20 = 4 + 5
    - 20 = 4 × 5
    - 20 ÷ 4 = 5
    correct_answer: 20 = 4 × 5
    citation_page: 61
