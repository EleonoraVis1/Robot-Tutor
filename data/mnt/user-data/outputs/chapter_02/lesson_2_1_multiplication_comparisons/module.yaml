    - 5 times as many as 7 is 35
    - 35 is 7 times as many as 5
    correct_answer: 5 times as many as 7 is 35
    citation_page: 61
  - id: q_i2
    type: short_answer
    has_visual: false
    prompt: 'Write a comparison sentence for: 54 = 6 × 9.

