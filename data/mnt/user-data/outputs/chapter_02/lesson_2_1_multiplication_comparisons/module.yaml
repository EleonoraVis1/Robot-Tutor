concepts: &id002
- id: c1
  term: Multiplication Comparisons
  definition: 'You can use multiplication to compare amounts. For example, 15 = 3 × 5 can be thought of as 15 is 3 times as
    many as 5, or 15 is 5 times as many as 3.

    '
  example: 15 is 3 times as many as 5. 15 is 5 times as many as 3.
worked_examples: &id003
- id: we1
  title: 'Unlock the Problem: Carly and Jack''s Pennies'
  has_visual: true
  visual_handling: cite_only
  visual_description: A bar model showing Carly's 9 pennies and Jack's pennies as 4 groups of Carly's pennies.
  steps:
  - Carly has 9 pennies. Jack has 4 times as many pennies as Carly. How many pennies does Jack have?
  - Draw a model and write an equation to solve.
  - 'Use the model to write an equation and solve: n = 4 × 9'
  - n = 36
  - 'Think: n is how many pennies Jack has.'
  answer: Jack has 36 pennies.
  citation_page: 59
- id: we2
  title: 'Example: Miguel and Sara''s Rabbits'
  has_visual: true
  visual_handling: cite_only
  visual_description: A bar model showing Miguel's 6 rabbits as 3 times Sara's unknown number of rabbits (n).
  steps:
  - Miguel has 3 times as many rabbits as Sara. Miguel has 6 rabbits. How many rabbits does Sara have?
  - Draw a model and write an equation to solve.
  - 'Think: You don’t know how many rabbits Sara has. Use n for Sara’s rabbits.'
  - 'Use the model to write an equation and solve: 6 = 3 × n'
  - 'Think: 3 times what number equals 6?'
  - The value of n is 2.
  answer: Sara has 2 rabbits.
  citation_page: 60
- id: we3
  title: Try This! Write an equation.
  has_visual: false
  steps:
  - 'Write an equation for: 21 is 7 times as many as 3.'
  answer: 21 = 7 × 3
  citation_page: 60
- id: we4
  title: Try This! Write a comparison sentence.
  has_visual: false
  steps:
  - 'Write a comparison sentence for: 8 × 5 = 40.'
  answer: 8 times as many as 5 is 40.
  citation_page: 60
