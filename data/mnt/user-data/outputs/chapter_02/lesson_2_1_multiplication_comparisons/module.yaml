concepts: &id002
- id: c1
  term: Multiplication Comparisons
  definition: 'You can use multiplication to compare amounts. For example, 15 = 3 × 5 can be thought of as 15 is 3 times as
    many as 5, or 15 is 5 times as many as 3.

    '
  example: 15 is 3 times as many as 5.
worked_examples: &id003
- id: we1
  title: Carly has 9 pennies. Jack has 4 times as many pennies as Carly. How many pennies does Jack have?
  has_visual: true
  visual_handling: cite_only
  visual_description: A bar model showing Carly's 9 pennies and Jack's pennies as 4 groups of Carly's amount.
  steps:
  - 'Understand the problem: Carly has 9 pennies. Jack has 4 times as many pennies as Carly. We need to find how many pennies
    Jack has.'
  - 'Draw a model: Represent Carly''s pennies as one unit of 9. Represent Jack''s pennies as 4 units of 9.'
  - 'Write an equation: n = 4 × 9'
  - 'Solve the equation: n = 36'
  answer: Jack has 36 pennies.
  citation_page: 59
- id: we2
  title: Miguel has 3 times as many rabbits as Sara. Miguel has 6 rabbits. How many rabbits does Sara have?
  has_visual: true
  visual_handling: cite_only
  visual_description: A bar model showing Miguel's 6 rabbits as 3 groups of Sara's unknown amount (n).
  steps:
  - 'Understand the problem: Miguel has 6 rabbits, which is 3 times as many as Sara. We need to find how many rabbits Sara
    has.'
  - 'Draw a model: Represent Sara''s rabbits as one unknown unit (n). Represent Miguel''s rabbits as 3 units of n, totaling
    6.'
  - 'Write an equation: 6 = 3 × n'
  - 'Solve the equation: 3 times what number equals 6? n = 2'
  answer: Sara has 2 rabbits.
  citation_page: 60
