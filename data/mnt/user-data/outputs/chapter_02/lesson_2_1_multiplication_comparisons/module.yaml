    - 3 × 7 = 21
    - 21 ÷ 3 = 7
    correct_answer: 3 × 7 = 21
    citation_page: 61
  - id: q_i4
    type: fill_in
    has_visual: false
    prompt: 'Write an equation for: 40 is 5 times as many as 8.

