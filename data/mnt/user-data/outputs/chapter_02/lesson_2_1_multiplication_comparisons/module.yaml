    has_visual: false
    prompt: 'Nando has 4 goldfish. Jill has 3 goldfish. Cooper has 2 times as many goldfish as Nando and Jill combined. Write
      an equation that compares the number of goldfish Cooper has with the number of goldfish that Nando and Jill have.

      '
    answer: Nando and Jill combined have 4 + 3 = 7 goldfish. Cooper has 2 times as many, so Cooper has 2 × (4 + 3) = 14 goldfish.
      The equation is C = 2 × (4 + 3) or C = 2 × 7.
