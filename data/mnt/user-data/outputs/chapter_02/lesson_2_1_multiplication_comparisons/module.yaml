quiz_questions:
  guided:
  - id: q_g1
    type: word_problem
    has_visual: false
    prompt: 'There are 8 students in the art club. There are 3 times as many students in chorus. How many students are in
      chorus?

      '
    answer: n = 3 × 8; n = 24. So, there are 24 students in chorus.
    options:
    - 21 students
    - 24 students
    - 11 students
    correct_answer: 24 students
    citation_page: 60
  - id: q_g2
    type: fill_in
    has_visual: true
    visual_handling: cite_only
    visual_description: A model showing 6 groups of 2, totaling 12.
    prompt: 'Draw a model and write an equation for: 6 times as many as 2 is 12.

      '
    answer: 'Model showing 6 groups of 2. Equation: 6 × 2 = 12.'
    options:
    - 6 + 2 = 8
    - 6 × 2 = 12
    - 12 ÷ 6 = 2
    correct_answer: 6 × 2 = 12
    citation_page: 61
  - id: q_g3
    type: fill_in
    has_visual: true
    visual_handling: cite_only
    visual_description: A model showing 4 groups of 5, totaling 20.
    prompt: 'Draw a model and write an equation for: 20 is 4 times as many as 5.

      '
    answer: 'Model showing 4 groups of 5. Equation: 20 = 4 × 5.'
    options:
    - 20 = 5 + 4
    - 20 = 4 × 5
    - 20 = 4 ÷ 5
    correct_answer: 20 = 4 × 5
    citation_page: 61
  - id: q_g4
    type: short_answer
    has_visual: false
    prompt: 'Write a comparison sentence for: 18 = 9 × 2.

      '
    answer: 18 is 9 times as many as 2.
    options:
    - 18 is 9 more than 2
    - 18 is 9 times as many as 2
    - 18 is 2 times as many as 9
    correct_answer: 18 is 9 times as many as 2
    citation_page: 61
  - id: q_g5
    type: short_answer
    has_visual: false
    prompt: 'Write a comparison sentence for: 8 × 4 = 32.

      '
    answer: 8 times as many as 4 is 32.
    options:
    - 8 plus 4 is 32
    - 8 times as many as 4 is 32
    - 32 is 8 times as many as 4
    correct_answer: 8 times as many as 4 is 32
    citation_page: 61
  independent:
  - id: q_i1
    type: short_answer
    has_visual: false
    prompt: 'Write a comparison sentence for: 5 × 7 = 35.

      '
    answer: 5 times as many as 7 is 35.
    options:
