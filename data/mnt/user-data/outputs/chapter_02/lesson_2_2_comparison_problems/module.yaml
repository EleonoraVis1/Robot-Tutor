concepts: &id002
- id: c1
  term: Comparison Problems
  definition: 'Comparison problems involve comparing two quantities, often using multiplication (e.g., "x times as much")
    or addition/subtraction (e.g., "how much more or fewer"). These problems can be solved by drawing models to represent
    the unknown quantities and relationships.

    '
  example: Evan’s dog weighs 7 times as much as Oxana’s dog. Together, the dogs weigh 72 pounds. How much does Evan’s dog
    weigh?
worked_examples: &id003
- id: we1
  title: Use a multiplication model.
  has_visual: true
  visual_handling: cite_only
  visual_description: A bar model showing Oxana's dog as 'n' and Evan's dog as '7n', with the total '72' for 8 parts.
  steps:
  - Draw a model. Let n represent how much Oxana’s dog weighs. Together, the dogs weigh 72 pounds.
  - Use the model to write an equation. Find the value of n. 8 × n = 72. The value of n is 9.
  - Find how much Evan’s dog weighs. Evan’s dog = 7 × 9. Multiply.
  answer: 63 pounds.
  citation_page: 63
- id: we2
  title: Use an addition or subtraction model.
  has_visual: true
  visual_handling: cite_only
  visual_description: A bar model showing Evan's dog (63 pounds) and Oxana's dog (9 pounds), with 'n' representing the difference.
  steps:
  - Draw a model. Let n represent the difference.
  - Use the model to write an equation. Find the value of n. 63 – 9 = n. Subtract.
  answer: The value of n is 54. Evan’s dog weighs 54 pounds more than Oxana’s dog.
  citation_page: 64
