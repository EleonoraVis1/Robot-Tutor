      prompt: >
        A benchmark jar holds 500 beads. Use the benchmark to find a
        reasonable estimate for the larger jar. Choose: 1,000; 2,000; or 3,000.
      answer: "2,000 (the larger jar appears to hold about 4 times the benchmark)"
      options:
