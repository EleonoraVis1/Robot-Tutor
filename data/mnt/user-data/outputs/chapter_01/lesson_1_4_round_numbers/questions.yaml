  word_problems:
    - id: q_w1
      type: word_problem
      difficulty: think_smarter
      has_visual: false
      prompt: >
        The number 2,■00 is missing a digit. Rounded to the nearest thousand
        it equals 3,000. List all possible missing digits and explain.
      answer: >
        The hundreds digit must be ≥ 5 to round 2,x00 up to 3,000.
        Possible digits: 5, 6, 7, 8, 9.
      options:
        - "5, 6, 7, 8, 9"
        - "4, 5, 6, 7, 8"
        - "6, 7, 8, 9"
      correct_answer: "5, 6, 7, 8, 9"
      citation_page: 19

