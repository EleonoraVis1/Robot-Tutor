questions:
  guided:
    - id: q_g1
      type: reasonableness
      # Textbook instructs: "Use the number line to help" — implicit visual dependency flagged.
      has_visual: true
      visual_handling: cite_only
      visual_description: "Number line 200,000–300,000 with midpoint 250,000 (p. 19)."
      prompt: >
        Suppose 255,113 people live in a city. Is it reasonable to say
        about 300,000 people live there? Use the number line to explain.
      answer: >
        Yes. 255,113 is above the halfway point of 250,000, so it rounds up
        to 300,000. The estimate is reasonable.
      options:
        - "Yes"
        - "No"
        - "Only on a number line"
      correct_answer: "Yes"
      citation_page: 19

