questions:
  guided:
    - id: q_g1
      type: fill_in
      has_visual: true
      visual_handling: cite_only
      visual_description: "Base-ten block table (cube/long/flat/cube up to 10,000) on p. 7."
      prompt: >
        Complete the table: How many small cubes make a long?
        How many longs make a flat? How many flats make a large cube?
      answer: "10 cubes ??long (10); 10 longs ??flat (100); 10 flats ??large cube (1,000)."
      options:
        - "10, 10, 10"
        - "10, 100, 1,000"
        - "1, 10, 100"
      correct_answer: "10, 10, 10"
      citation_page: 7

    - id: q_g2
      type: find_value
      has_visual: false
      prompt: "Find the value of the underlined digit: [7]03,890"
      answer: "700,000"
      options:
        - "70,000"
        - "700,000"
        - "7,000"
      correct_answer: "700,000"
      citation_page: 7

    - id: q_g3
      type: find_value
      has_visual: false
      prompt: "Find the value of the underlined digit: 63,[5]40"
      answer: "500"
      options:
        - "50"
        - "500"
        - "5,000"
      correct_answer: "500"
      citation_page: 7

    - id: q_g4
      type: compare_values
      has_visual: false
      prompt: "Compare: 2,000 and 200. The value of 2 in ___ is ___ times the value of 2 in ___."
      answer: "The value of 2 in 2,000 is 10 times the value of 2 in 200."
      options:
        - "2,000 is 10 times 200"
        - "200 is 10 times 2,000"
        - "2,000 is 100 times 200"
      correct_answer: "2,000 is 10 times 200"
      citation_page: 7

  independent:
