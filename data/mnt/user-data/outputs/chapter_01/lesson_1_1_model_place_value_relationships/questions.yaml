    - id: q_i5
      type: compare_values
      has_visual: false
      prompt: >
        Compare: 6[7],908 and [7]6,908.
        The value of 7 in ___ is ___ times the value of 7 in ___.
      answer: "The value of 7 in 76,908 is 10 times the value of 7 in 67,908."
      options:
        - "76,908 is 10 times 67,908"
        - "67,908 is 10 times 76,908"
        - "76,908 is 100 times 67,908"
