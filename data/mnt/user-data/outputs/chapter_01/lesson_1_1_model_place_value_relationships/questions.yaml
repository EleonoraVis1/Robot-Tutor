    - id: q_i6
      type: compare_values
      has_visual: false
      prompt: >
        Compare: 546,[3]00 and [3],456.
        The value of 3 in ___ is ___ times the value of 3 in ___.
      answer: "The value of 3 in 546,300 is 100 times the value of 3 in 3,456."
      options:
        - "546,300 is 10 times 3,456"
        - "546,300 is 100 times 3,456"
        - "3,456 is 100 times 546,300"
      correct_answer: "546,300 is 100 times 3,456"
      citation_page: 7

  word_problems:
    - id: q_w1
      type: word_problem
      difficulty: deeper
      has_visual: false
      prompt: >
        Use the City Populations table (Cleveland 431,369; Denver 610,345;
        Memphis 676,640). What is the value of the digit 7 in the population
        of Memphis? How many times as much is the value of that place
        than the value of the place to its right?
      answer: "70,000; the ten-thousands place is 10 times the thousands place."
      options:
        - "70,000; 10 times"
        - "7,000; 10 times"
        - "70,000; 100 times"
      correct_answer: "70,000; 10 times"
      citation_page: 8

    - id: q_w2
