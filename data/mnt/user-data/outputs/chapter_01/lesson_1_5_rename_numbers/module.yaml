concepts: &id002
- id: c1
  term: rename / regroup
  definition: 'Express the same number using different combinations of place-value units.

    '
  example: 1,200 = 1 thousand 2 hundreds = 12 hundreds = 120 tens = 1,200 ones.
worked_examples: &id003
- id: we1
  title: Model 1,200 as hundreds
  has_visual: true
  visual_handling: cite_only
  visual_description: Quick pictures of 1 large cube + 2 flats, then 12 flats (pp. 23–24).
  steps:
  - 1,200 = 1 large cube (1,000) + 2 flats (200).
  - 'Regroup: 1,000 = 10 hundreds, so 1,000 + 200 = 12 hundreds.'
  - 1,200 = 12 hundreds.
  answer: 12 hundreds
  citation_page: 23
- id: we2
  title: Rename 500,000 using a place-value chart
  has_visual: true
  visual_handling: cite_only
  visual_description: Place-value chart with 5 in the hundred-thousands column (p. 24).
  steps:
  - 500,000 = 5 hundred-thousands
  - = 50 ten-thousands
  - = 500 thousands
  - = 5,000 hundreds
  - = 50,000 tens
  - = 500,000 ones
  answer: Multiple equivalent names; see steps.
  citation_page: 24
- id: we3
  title: Write 32 hundreds in standard form
  has_visual: false
  steps:
  - 32 hundreds means 32 × 100.
  - 32 × 100 = 3,200.
  - 'Standard form: 3,200.'
  answer: 3,200
  citation_page: 24
