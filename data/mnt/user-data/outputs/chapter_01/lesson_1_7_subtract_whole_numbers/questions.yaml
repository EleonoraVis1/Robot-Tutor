      prompt: >
        Janice computed 268,601 − 12,407 = 144,531.
        Describe her error and give the correct answer.
      answer: >
        Janice did not align the digits by place value — she subtracted
        as if 12,407 were a 6-digit number, misaligning columns.
        Correct: 268,601 − 12,407 = 256,194.
      citation_page: 34
