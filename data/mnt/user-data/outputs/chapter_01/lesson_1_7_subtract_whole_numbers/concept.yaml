concepts:
  - id: c1
    term: "subtraction algorithm"
    definition: >
      Line up the minuend and subtrahend by place value; subtract column
      by column from right to left, regrouping (borrowing) when needed.
    example: "16,421 − 14,831 = 1,590"

  - id: c2
    term: "inverse operations"
    definition: >
      Operations that undo each other. Addition and subtraction are inverse
      operations — you can use addition to check a subtraction answer.
    example: "1,590 + 14,831 = 16,421 ✓"

  - id: c3
    term: "estimate a difference"
    definition: >
      Round each number to a specified place value, then subtract.
    example: "16,000 − 15,000 = 1,000 (estimate for 16,421 − 14,831)"

worked_examples:
  - id: we1
    title: "Subtract 16,421 − 14,831"
    has_visual: false
    steps:
      - "Estimate: 16,000 − 15,000 = 1,000."
      - "Step 1 — Ones: 1 − 1 = 0. Tens: regroup 4 hundreds 2 tens → 3 hundreds 12 tens; 12 − 3 = 9."
      - "Step 2 — Hundreds: regroup 6 thousands 3 hundreds → 5 thousands 13 hundreds; 13 − 8 = 5."
      - "Step 3 — Thousands: 5 − 4 = 1. Ten-thousands: 1 − 1 = 0. Difference: 1,590."
      - "Check: 1,590 + 14,831 = 16,421 ✓"
    answer: "1,590 (Mt. Bona is 1,590 feet taller)"
    citation_page: 31
