  word_problems:
    - id: q_w1
      type: word_problem
      difficulty: deeper
      has_visual: false
      prompt: >
        At Monica's Used Cars the weekly sales goal is $25,500.
        Sales for three weeks were $28,288; $25,369; and $25,876.
        Which total did not meet the goal?
      answer: "$25,369 (less than $25,500)"
      options:
        - "$25,369"
        - "$25,876"
        - "$28,288"
      correct_answer: "$25,369"
      citation_page: 15

    - id: q_w2
      type: error_analysis
      difficulty: think_smarter
      has_visual: false
      prompt: >
        Max said 36,594 is less than 5,980 because 3 is less than 5.
        Describe his error and give the correct answer.
      answer: >
        Max compared only the leading digits without considering place value.
        36,594 has 5 digits; 5,980 has 4 digits. A 5-digit number is always
        greater than a 4-digit number. So 36,594 > 5,980.
      options:
        - "36,594 > 5,980"
        - "36,594 < 5,980"
        - "36,594 = 5,980"
      correct_answer: "36,594 > 5,980"
      citation_page: 15

