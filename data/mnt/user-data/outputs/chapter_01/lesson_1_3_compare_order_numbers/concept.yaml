title: "Compare and Order Numbers"
essential_question: "How can you compare and order numbers?"
standards: ["4.NBT.2"]
mathematical_practices: ["MP.2", "MP.4", "MP.5"]

citation:
  textbook: "GO Math Grade 4 California (Houghton Mifflin Harcourt)"
  chapter: 1
  lesson: 3
  pages: [13, 14, 15, 16]

