lesson_id: "math_g4_ch1_l2"
subject: math
grade: 4
unit: 1
chapter: 1
lesson: 2
title: "Read and Write Numbers"
standards: ["4.NBT.2"]

citation:
  textbook: "GO Math Grade 4 California (Houghton Mifflin Harcourt)"
  chapter: 1
  lesson: 2
  pages: [9, 10, 11, 12]

questions:
  guided:
    - id: q_g1
      type: conversion
      has_visual: false
      prompt: "Read and write in two other forms: four hundred eight thousand, seventeen"
      answer: "Standard: 408,017; Expanded: 400,000 + 8,000 + 10 + 7"
      citation_page: 10

    - id: q_g2
      type: conversion
      has_visual: false
      prompt: "Read and write 65,058 in two other forms."
      answer: "Word: sixty-five thousand, fifty-eight; Expanded: 60,000 + 5,000 + 50 + 8"
      citation_page: 10

  independent:
    - id: q_i1
      type: conversion
      has_visual: false
      prompt: "Write five hundred eight thousand in two other forms."
      answer: "Standard: 508,000; Expanded: 500,000 + 8,000"
      citation_page: 10

    - id: q_i2
      type: conversion
      has_visual: false
      prompt: "Write forty thousand, six hundred nineteen in two other forms."
      answer: "Standard: 40,619; Expanded: 40,000 + 600 + 10 + 9"
      citation_page: 10

    - id: q_i3
      type: conversion
      has_visual: false
      prompt: "Write 570,020 in two other forms."
      answer: "Word: five hundred seventy thousand, twenty; Expanded: 500,000 + 70,000 + 20"
      citation_page: 10

    - id: q_i4
      type: conversion
      has_visual: false
      prompt: "Write 400,000 + 60,000 + 5,000 + 100 in two other forms."
      answer: "Standard: 465,100; Word: four hundred sixty-five thousand, one hundred"
      citation_page: 10

    - id: q_i5
      type: short_answer
      has_visual: false
      prompt: "Use the number 145,973. Write the name of the period that has the digits 145."
      answer: "thousands period"
      citation_page: 10

    - id: q_i6
      type: short_answer
      has_visual: false
      prompt: "Use the number 145,973. Write the digit in the ten-thousands place."
      answer: "4"
      citation_page: 10

  word_problems:
    - id: q_w1
      type: word_problem
      has_visual: false
      prompt: >
        Use the Major Cities in North Carolina table (Durham 229,171;
        Greensboro 255,124; Raleigh 405,612).
        Which city has a population of two hundred fifty-five thousand, one hundred twenty-four?
      answer: "Greensboro"
      citation_page: 11

    - id: q_w2
      type: word_problem
      has_visual: false
      prompt: >
        Write the population of Raleigh (405,612) in expanded form and word form.
      answer: "Expanded: 400,000 + 5,000 + 600 + 10 + 2; Word: four hundred five thousand, six hundred twelve"
      citation_page: 11

    - id: q_w3
      type: error_analysis
      difficulty: think_smarter
      has_visual: false
      prompt: >
        Sophia said the expanded form for 605,970 is 600,000 + 50,000 + 900 + 70.
        Describe her error and give the correct answer.
      answer: >
        Sophia incorrectly wrote 50,000 for the digit 0 in the ten-thousands place
        and omitted the 5,000 (hundreds digit of the thousands period).
        Correct expanded form: 600,000 + 5,000 + 900 + 70.
      citation_page: 11

    - id: q_w4
      type: multiple_select
      difficulty: think_smarter
      has_visual: false
      prompt: "What is another way to write 615,004? Mark all that apply."
      options:
        A: "six hundred fifteen thousand, four"
        B: "six hundred five thousand, fourteen"
        C: "60,000 + 10,000 + 5,000 + 4"
        D: "600,000 + 10,000 + 5,000 + 4"
      answer: "A and D"
      citation_page: 12
