    type: word_problem_diagram
    has_visual: true
    visual_handling: cite_only
    visual_description: Blank bar-model template on p. 37.
    prompt: 'A world record balloon altitude of 64,997 ft was set in 1988. In 2005 a new record of 68,986 ft was set. How
      many feet higher was the 2005 record?

      '
    answer: 68,986 − 64,997 = 3,989 feet higher.
    options:
    - 1,014 feet
    - 3,989 feet
    - 4,011 feet
    correct_answer: 3,989 feet
    citation_page: 37
  - id: q_g2
    type: word_problem
    has_visual: false
    prompt: 'What if a new record of 70,000 ft was set? How many feet higher than the 2005 record of 68,986 ft?

      '
    answer: 70,000 − 68,986 = 1,014 feet higher.
    options:
    - 1,140 feet
    - 986 feet
    - 1,014 feet
    correct_answer: 1,014 feet
    citation_page: 37
  - id: q_g3
    type: word_problem
    has_visual: false
    prompt: 'Ticket sales last year: $109,076. This year: $125,805. How much more were ticket sales this year?

