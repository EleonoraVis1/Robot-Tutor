concepts:
  - id: c1
    term: "bar model (tape diagram)"
    definition: >
      A visual strategy for representing part-whole or comparison
      relationships in a word problem; used to choose the correct
      operation (addition or subtraction).
    example: >
      Two bars — one labelled 18,925 (larger amount) and one 17,350
      (smaller amount) — show the unknown difference □.

  - id: c2
    term: "comparison problem"
    definition: >
      A problem that asks how much more or how much less one quantity
      is compared to another, or asks for the larger/smaller quantity
      given the other and the difference.

worked_examples:
  - id: we1
    title: "Hot-air balloon festival: How many more attended on day 2 (18,925) than day 1 (17,350)?"
    has_visual: true
    visual_handling: cite_only
    visual_description: "Bar model with 18,925 and 17,350 bars, difference □ (p. 35)."
    steps:
      - "Read: larger = 18,925; smaller = 17,350; find difference."
      - "Draw bar model: large bar 18,925, smaller bar 17,350, unknown □ to the right."
      - "Write equation: 18,925 − 17,350 = □"
      - "Solve: 18,925 − 17,350 = 1,575."
    answer: "1,575 more people on day 2."
    citation_page: 35

  - id: we2
    title: "Balloon traveled 5,110 ft on trip 1 and 850 more on trip 2. How far on trip 2?"
    has_visual: true
    visual_handling: cite_only
    visual_description: "Bar model for addition comparison (p. 36)."
    steps:
      - "Read: trip 1 = 5,110 ft; trip 2 is 850 more."
      - "Draw bar model showing trip 1 bar and an additional □ = 850."
      - "Equation: 5,110 + 850 = □"
      - "Solve: 5,960 feet."
    answer: "5,960 feet"
    citation_page: 36
