lesson_id: "math_g4_ch1_l8"
subject: math
grade: 4
unit: 1
chapter: 1
lesson: 8
title: "Problem Solving — Comparison Problems with Addition and Subtraction"
standards: ["4.NBT.4"]

citation:
  textbook: "GO Math Grade 4 California (Houghton Mifflin Harcourt)"
  chapter: 1
